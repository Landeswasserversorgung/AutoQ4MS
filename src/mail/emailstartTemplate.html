<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style type="text/css">
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f7f7f7;
        color: #333;
    }
    .content-box {
        background-color: #ffffff;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        padding: 20px;
        margin: 20px auto;
        max-width: 600px;
        position: relative;
    }
    .content-box-header {
        display: flex; /* Flexbox für Ausrichtung verwenden */
        align-items: center; /* Vertikal zentrieren */
        justify-content: flex-start; /* Links ausrichten */
        background-color: #ffffff; /* Weißer Hintergrund */
        color: #ffffff;
        padding: 15px;
        border-radius: 10px 10px 0 0;
        border: 2px solid #0056b3; /* Blauer Rahmen */
        font-size: 18px;
        text-align: left; /* Text links ausrichten */
        min-height: 35px;
        position: relative;
    }

    .header-img {
        width: 430px;           /* Bildgröße */
        height: auto;

        position: left;    /* frei positionierbar */
        top: 5px;             /* Abstand von oben */
        right: 100px;           /* Abstand von rechts */
    }

    .warning {
        color: #d9534f;
        font-weight: bold;
        font-size: 16px;
        margin: 20px 0;
        padding: 10px;
        background-color: #f2dede;
        border-radius: 5px;
        border: 1px solid #ebccd1;
        text-align: center;
    }
    .content-box p {
        line-height: 1.6;
    }
    .flowchart {
        margin: 20px 0;
        padding: 20px;
        background-color: #e9ecef;
        border-radius: 5px;
        text-align: center;
    }
    .footer {
        text-align: center;
        margin-top: 20px;
        font-size: 12px;
        color: #888;
    }
    .code-red {
        background-color: #f2dede; /* Gelber Hintergrund */
        color: #333; /* Dunklerer Gelbton für den Text */
        border: 1px solid #ebccd1; /* Dunkler gelber Rahmen */
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        text-align: center;
    }
    
    .code-yellow {
        background-color: #ffff99; /* Gelber Hintergrund */
        color: #333; /* Dunklerer Gelbton für den Text */
        border: 1px solid #cccc00; /* Dunkler gelber Rahmen */
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        text-align: center;
    }
    
    img.logo {
        width: 150px; /* Bildgröße auf 100px Breite setzen */
        height: auto; /* Höhe automatisch anpassen */
    }
    img.graph {
        width: 600px;  /*Bildgröße auf 100px Breite setzen */
        height: auto; /* Höhe automatisch anpassen */
    }
</style>
</head>
